server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ai-saas-mybatis
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/productflow}
    username: ${DATABASE_USERNAME:productflow}
    password: ${DATABASE_PASSWORD:productflow}
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB


productflow:
  template: ai-saas
  data-layer: mybatis
  ai:
    provider: ${AI_PROVIDER:mock}
  files:
    storage-dir: ${FILE_STORAGE_DIR:uploads}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
